<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>터치 슬라이드 쇼</title>
    <style>
        /* 1. CSS 스타일링 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #000; /* 배경을 검정으로 하면 이미지가 더 돋보입니다 */
        }

        .slideshow-container {
            max-width: 1000px;
            position: relative;
            margin: auto;
            overflow: hidden;
            background-color: #222;
        }

        /* 터치 영역 설정 */
        .touch-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
        }

        .prev-zone, .next-zone {
            width: 50%;
            height: 100%;
            cursor: pointer;
            /* 작동 확인을 위해 아주 살짝 투명도를 줄 수 있습니다 */
            -webkit-tap-highlight-color: transparent; 
        }

        .mySlides {
            display: none;
        }

        img {
            vertical-align: middle;
            object-fit: contain;
            width: 100%;
            height: auto;
        }

        /* 부드러운 전환 효과 */
        .fade {
            animation: fade 1.0s;
        }

        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }

        .text {
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 11;
        }
    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="touch-zones">
            <div class="prev-zone" onclick="plusSlides(-1)"></div>
            <div class="next-zone" onclick="plusSlides(1)"></div>
        </div>

        <div class="mySlides fade">
            <img src="image_0.jpg">
            <div class="text">1 / 5</div>
        </div>

        <div class="mySlides fade">
            <img src="image_1.jpg">
            <div class="text">2 / 5</div>
        </div>

        <div class="mySlides fade">
            <img src="image_2.jpg">
            <div class="text">3 / 5</div>
        </div>

        <div class="mySlides fade">
            <img src="image_3.jpg">
            <div class="text">4 / 5</div>
        </div>

        <div class="mySlides fade">
            <img src="image_4.jpg">
            <div class="text">5 / 5</div>
        </div>
    </div>

    <script>
        // 2. JavaScript 기능
        let slideIndex = 1;
        let slideTimer;

        showSlides(slideIndex);
        startTimer();

        function plusSlides(n) {
            showSlides(slideIndex += n);
            resetTimer();
        }

        function showSlides(n) {
            let slides = document.getElementsByClassName("mySlides");
            
            if (n > slides.length) {slideIndex = 1} 
            if (n < 1) {slideIndex = slides.length}
            
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none"; 
            }
            slides[slideIndex-1].style.display = "block"; 
        }

        function startTimer() {
            slideTimer = setInterval(function() {
                plusSlides(1);
            }, 3000); // 3초마다 다음 슬라이드
        }

        function resetTimer() {
            clearInterval(slideTimer);
            startTimer();
        }
    </script>

</body>
</html>
