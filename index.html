<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복음 프레젠테이션</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; cursor: pointer; }
        .slide-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* 모든 이미지는 처음에 숨김 */
        .slide-img { 
            position: absolute;
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none; /* 클릭 간섭 방지 */
        }
        
        /* 현재 보이는 이미지만 활성화 */
        .slide-img.active { 
            opacity: 1; 
            display: block; 
            pointer-events: auto;
        }

        /* 상단 진행바 */
        .progress-bar { position: absolute; top: 0; left: 0; height: 4px; background: #4CAF50; transition: width 0.3s; z-index: 10; }
        
        /* 하단 안내 */
        .info-text { position: absolute; bottom: 10px; color: rgba(255,255,255,0.5); font-size: 12px; width: 100%; text-align: center; }
    </style>
</head>
<body onclick="nextSlide()">
    <div class="progress-bar" id="pb"></div>
    <div class="slide-container">
        <img src="Slide1.jpg" class="slide-img active">
        <img src="Slide2.jpg" class="slide-img">
        <img src="Slide3.jpg" class="slide-img">
        <img src="Slide4.jpg" class="slide-img">
        <img src="Slide5.jpg" class="slide-img">
        <img src="Slide6.jpg" class="slide-img">
        <img src="Slide7.jpg" class="slide-img">
        <img src="Slide8.jpg" class="slide-img">
        <img src="Slide9.jpg" class="slide-img">
        <img src="Slide10.jpg" class="slide-img">
    </div>
    <div class="info-text">화면을 터치하면 다음으로 넘어갑니다.</div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide-img');
        const pb = document.getElementById('pb');

        function nextSlide() {
            // 현재 이미지 숨기기
            slides[currentIdx].classList.remove('active');
            
            // 다음 인덱스로 이동 (마지막이면 처음으로)
            currentIdx = (currentIdx + 1) % slides.length;
            
            // 다음 이미지 보이기
            slides[currentIdx].classList.add('active');
            
            // 진행도 표시
            pb.style.width = ((currentIdx + 1) / slides.length * 100) + "%";
        }
        
        // 초기 진행바 설정
        pb.style.width = (1 / slides.length * 100) + "%";

        // 이미지 로딩 오류 확인용 콘솔 로그
        slides.forEach((img, index) => {
            img.onerror = function() {
                console.error("이미지를 찾을 수 없습니다: " + img.src);
            };
        });
    </script>
</body>
</html>
