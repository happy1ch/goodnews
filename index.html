<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>복음 프레젠테이션</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; cursor: pointer; user-select: none; }
        .slide-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        .slide-img { 
            position: absolute;
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            opacity: 0;
            transition: opacity 0.4s ease;
            display: none;
        }
        
        .slide-img.active { opacity: 1; display: block; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 5px; background: #4CAF50; transition: width 0.3s; z-index: 10; width: 0%; }

        /* 전체화면 시작 버튼 스타일 */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; cursor: pointer;
        }
        #start-overlay h2 { margin-bottom: 20px; font-weight: normal; }
        .start-btn { padding: 15px 40px; background: #4CAF50; border: none; color: white; border-radius: 30px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="startPresentation(event)">
        <h2>프레젠테이션 시작</h2>
        <button class="start-btn">전체 화면으로 보기</button>
    </div>

    <div class="progress-bar" id="pb"></div>
    
    <div class="slide-container" onclick="nextSlide()">
        <img src="image_0.jpg" class="slide-img active">
        <img src="image_1.jpg" class="slide-img">
        <img src="image_2.jpg" class="slide-img">
        <img src="image_3.jpg" class="slide-img">
        <img src="image_4.jpg" class="slide-img">
        <img src="image_5.jpg" class="slide-img">
        <img src="image_6.jpg" class="slide-img">
        <img src="image_7.jpg" class="slide-img">
        <img src="image_8.jpg" class="slide-img">
        <img src="image_9.jpg" class="slide-img">
    </div>

    <script>
        let currentIdx = 0;
        const slides = document.querySelectorAll('.slide-img');
        const pb = document.getElementById('pb');

        function startPresentation(event) {
            // 이벤트 전파 방지
            event.stopPropagation();
            
            // 전체 화면 모드 진입
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();

            // 오버레이 숨기기
            document.getElementById('start-overlay').style.display = 'none';
            updateProgressBar();
        }

        function updateProgressBar() {
            pb.style.width = ((currentIdx + 1) / slides.length * 100) + "%";
        }

        function nextSlide() {
            if (slides.length === 0) return;
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % slides.length;
            slides[currentIdx].classList.add('active');
            updateProgressBar();
        }
    </script>
</body>
</html>
